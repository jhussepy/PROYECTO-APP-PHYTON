<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>PySec Academy Elite v11.3.0 Elite Collection Expansion</title>
  <meta name="description" content="Learning OS PWA para dominar Python, IA local, productividad y ciberseguridad ética con práctica verificable." />
  <meta name="theme-color" content="#050807" />
  <meta name="color-scheme" content="dark light" />
  <meta name="application-name" content="PySec Elite" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PySec Elite" />
  <meta property="og:title" content="PySec Academy Elite v11.3.0 Elite Collection Expansion" />
  <meta property="og:description" content="Tu sistema de aprendizaje técnico: Python, IA local, proyectos y laboratorios defensivos autorizados." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="assets/screenshot-mobile.png" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header class="main-header">
      <button class="logo" id="btn-home-logo" aria-label="Ir al inicio">
        <span class="logo-mark">🛡️</span>
        <span class="logo-copy" title="Ethical Cyber Learning OS">
          <span class="logo-title">PySec Elite</span>
          <span class="logo-subtitle">Ethical Cyber OS</span>
        </span>
      </button>
      <div class="header-system-status" aria-label="Estado del sistema">
        <span id="system-online-status" data-tone="success">ONLINE</span>
        <span id="system-ai-status" data-tone="success">LOCAL PRO</span>
      </div>
      <div class="user-stats" aria-label="Estadísticas del usuario">
        <button class="install-header-btn" id="install-app-btn" type="button" onclick="installPySecApp()" title="Instalar aplicación">INSTALAR</button>
        <button class="theme-toggle" id="theme-toggle" type="button" title="Cambiar tema">🌙</button>
        <button class="stat-item stat-button" id="btn-rank-xp" type="button" title="Ver sistema de rangos"><span>⚡</span><span id="total-xp">0</span></button>
        <div class="stat-item" title="Racha de estudio"><span>🔥</span><span id="streak-days">0</span></div>
      </div>
    </header>
    <main id="main-container" tabindex="-1">
      <div class="loading-screen"><div class="loader"></div><p>INICIALIZANDO_PRO_LEARNING_OS...</p></div>
    </main>
    <nav class="bottom-nav cyber-dock" aria-label="Cyber Dock v2">
      <button class="nav-btn active" data-view="home" title="Base"><span>⌂</span><small>Base</small></button>
      <button class="nav-btn" data-view="courses" title="Rutas"><span>▦</span><small>Rutas</small></button>
      <button class="nav-btn nav-mission" data-view="mission" title="Abrir próxima misión"><span>▶</span><small>Misión</small></button>
      <button class="nav-btn nav-market" data-view="market" title="Acciones en vivo"><span>▥</span><small>Acciones</small></button>
      <button class="nav-btn" data-view="game" title="Game Hub"><span>🎮</span><small>Game</small></button>
      <button class="nav-btn" data-view="profile" title="Agente"><span>◉</span><small>Agente</small></button>
    </nav>
  </div>
  <input id="import-progress-file" type="file" accept="application/json,.json" hidden />
  <script>
    window.PYSEC_BUILD = '1130-elite-collection-expansion';
    try {
      const key = 'pysec_active_build';
      const previous = localStorage.getItem(key);
      if (previous !== window.PYSEC_BUILD && 'caches' in window) {
        localStorage.setItem(key, window.PYSEC_BUILD);
        Promise.resolve()
          .then(() => caches.keys())
          .then(keys => Promise.all(keys.filter(name => name.startsWith('pysec-')).map(name => caches.delete(name))))
          .then(() => navigator.serviceWorker ? navigator.serviceWorker.getRegistrations() : [])
          .then(registrations => Promise.all([...registrations].map(registration => registration.unregister())))
          .then(() => location.reload());
      }
    } catch (_) {}
    window.PYSEC_WORKER_PATH = 'js/runner-worker.js';
  </script>
  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/curriculum-upgrade.js"></script>
  <script src="js/learning-paths.js"></script>
  <script src="js/state.js"></script>
  <script src="js/validation.js"></script>
  <script src="js/platform-core.js"></script>
  <script src="js/local-ai-core.js"></script>
  <script src="js/ai-mentor-cloud.js"></script>
  <script src="js/runner.js"></script>
  <script src="js/ui-components.js"></script>
  <script src="js/elite-store.js"></script>
  <script src="js/rank-system.js"></script>
  <script src="js/agent-command.js"></script>
  <script src="js/market.js"></script>
  <script src="js/strategy-engine.js"></script>
  <script src="js/market-intelligence-ux.js"></script>
  <script src="js/market-clean-flow.js"></script>
  <script src="js/market-command-dashboard.js"></script>
  <script src="js/ai-agent.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/learning-os.js"></script>
  <script src="js/router.js"></script>
  <script src="js/event-delegation.js"></script>
  <script src="js/avatar3d.js"></script>
  <script src="js/pyodide-engine.js"></script>
  <script src="js/game-hub.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
